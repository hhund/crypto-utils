version: 2
updates:
  # Java / Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 15
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      maven-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
